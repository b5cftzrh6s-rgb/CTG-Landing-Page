<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Control Value Calculator — CTG Tools</title>

<style>
:root{
  --blue:#003a70; --blue-dark:#002347; --teal:#00a7b5;
  --accent:#e87722; --bg:#f4f6f9; --card:#fff;
  --border:#dbe1ea; --text:#1f2a3a;
}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text)}

.navbar{background:var(--blue-dark);color:#fff;padding:0 20px;display:flex;justify-content:space-between}
.navbar .brand{padding:16px 0;font-weight:700}
.navbar ul{list-style:none;display:flex;margin:0;padding:0}
.navbar ul li a{color:#fff;text-decoration:none;padding:16px 14px;display:block}
.navbar ul li a.active{background:var(--teal)}

header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;padding:30px}

main{max-width:1200px;margin:auto;padding:20px}

.card{background:#fff;border:1px solid var(--border);padding:20px;margin-bottom:15px;border-radius:8px}
h3{margin-top:0;color:var(--blue)}

input{width:100%;padding:8px;margin-top:5px;border:1px solid var(--border)}

.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1;min-width:200px}

.toggle{display:flex;gap:10px;margin-bottom:10px}
.toggle button{flex:1;padding:10px;border:none;background:#ddd;cursor:pointer}
.toggle button.active{background:var(--blue);color:#fff}

.result{font-weight:700;font-size:18px;color:#2e7d32;margin-top:10px}
</style>
</head>

<body>

<nav class="navbar">
  <div class="brand">CTG | Colloidal Technologies Group</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shell-control-correlation.html">Correlation</a></li>
    <li><a href="shell-control-value-calculator.html" class="active">Value</a></li>
    <li><a href="slurry-calculator.html">Slurry</a></li>
    <li><a href="tank-rpm-calculator.html">RPM</a></li>
  </ul>
</nav>

<header>
  <h1>Shell Control Value Calculator</h1>
</header>

<main>

<!-- MODE TOGGLE -->
<div class="card">
<h3>Input Mode</h3>
<div class="toggle">
<button id="modeA" class="active" onclick="setMode('A')">Cost per Part</button>
<button id="modeB" onclick="setMode('B')">Annual Scrap $</button>
</div>
</div>

<!-- MODE A -->
<div class="card" id="modeAInputs">
<h3>Production Inputs</h3>

<div class="row">
<div class="col"><label>Annual Parts</label><input id="parts"></div>
<div class="col"><label>Scrap %</label><input id="scrap"></div>
<div class="col"><label>Reduction %</label><input id="reduction"></div>
</div>

<div class="row">
<div class="col"><label>Cost Low</label><input id="costLow"></div>
<div class="col"><label>Cost High</label><input id="costHigh"></div>
</div>

<div class="row">
<div class="col"><label>Price Low</label><input id="priceLow"></div>
<div class="col"><label>Price High</label><input id="priceHigh"></div>
</div>

<div class="col"><label>Variable Cost %</label><input id="vc"></div>

</div>

<!-- MODE B -->
<div class="card" id="modeBInputs" style="display:none">
<h3>Scrap Inputs</h3>

<div class="row">
<div class="col"><label>Annual Scrap $</label><input id="scrapDollars"></div>
<div class="col"><label>Reduction %</label><input id="reductionB"></div>
</div>

</div>

<!-- FIXED DRIVERS -->
<div class="card">
<h3>Other Value Drivers</h3>

<div class="row">
<div class="col"><label>Labor Savings</label><input id="labor"></div>
<div class="col"><label>Slurry Savings</label><input id="slurry"></div>
</div>

<div class="row">
<div class="col"><label>Downtime Savings</label><input id="downtime"></div>
<div class="col"><label>Safety Savings</label><input id="safety"></div>
</div>

</div>

<!-- RESULTS -->
<div class="card">
<h3>Total Value</h3>
<div class="result" id="result">$0</div>
</div>

</main>

<script>

let mode = 'A';

function setMode(m){
  mode = m;
  document.getElementById("modeA").classList.toggle("active",m==="A");
  document.getElementById("modeB").classList.toggle("active",m==="B");

  document.getElementById("modeAInputs").style.display = m==="A"?"block":"none";
  document.getElementById("modeBInputs").style.display = m==="B"?"block":"none";

  calc();
}

function num(id){
  return parseFloat(document.getElementById(id).value)||0;
}

function calc(){

  let scrapVal = 0;
  let revenue = 0;

  if(mode==="A"){
    let recovered = num("parts")*(num("scrap")/100)*(num("reduction")/100);

    let costLow = num("costLow")||num("costHigh");
    let costHigh = num("costHigh")||num("costLow");

    scrapVal = recovered*((costLow+costHigh)/2);

    let price = (num("priceLow")+num("priceHigh"))/2;
    let vc = num("vc")/100;

    revenue = recovered*price*(1-vc);

  } else {
    scrapVal = num("scrapDollars")*(num("reductionB")/100);
  }

  let fixed = num("labor")+num("slurry")+num("downtime")+num("safety");

  let total = scrapVal + revenue + fixed;

  document.getElementById("result").innerText = "$"+Math.round(total).toLocaleString();
}

document.querySelectorAll("input").forEach(i=>i.addEventListener("input",calc));

</script>

</body>
</html>
