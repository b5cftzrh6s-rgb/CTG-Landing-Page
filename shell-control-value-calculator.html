<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Control Value Calculator — CTG Tools</title>

<style>
:root{
  --blue:#003a70; --blue-dark:#002347; --teal:#00a7b5;
  --accent:#e87722; --green:#2e7d32; --bg:#f4f6f9;
  --card:#fff; --border:#dbe1ea; --text:#1f2a3a; --muted:#5b6b80;
}
body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:var(--text)}

.navbar{
  background:var(--blue-dark);
  color:#fff;
  padding:0 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.navbar .brand{font-weight:700;font-size:18px;padding:18px 0}
.navbar ul{list-style:none;margin:0;padding:0;display:flex}
.navbar ul li a{
  color:#fff;
  text-decoration:none;
  padding:18px 20px;
  display:block;
}
.navbar ul li a:hover{background:var(--blue)}
.navbar ul li a.active{background:var(--teal)}

header{
  background:var(--blue);
  color:#fff;
  padding:30px;
}
header h1{margin:0}
main{max-width:1100px;margin:20px auto;padding:0 20px}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:16px;
  margin-bottom:16px;
}

input{width:100%;padding:6px;margin-top:4px}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #ddd;text-align:right}
th:first-child,td:first-child{text-align:left}

.total{
  background:var(--blue);
  color:#fff;
  padding:20px;
  border-radius:8px;
  font-size:24px;
  text-align:center;
}
</style>
</head>

<body>

<!-- ✅ FIXED NAVIGATION -->
<nav class="navbar">
  <div class="brand">CTG | Colloidal Technologies Group</div>
  <ul>
    <li>index.htmlHome</a></li>
    <li><a href="shell-control-correlation.html">Shell Control Correlation</a></li>
    <li><a href="shell-control-value-calculator.html" class="active">Shell Control Value Calculator</a></li>
    <li><a href="slurry-calculator.html">Slurry Calculator</a></li>
  </ul>
</nav>

<header>
  <h1>Shell Control Value Calculator</h1>
  <p>3D TRASAR Technology for Shell Control</p>
</header>

<main>

<div class="card">
  <h3>Inputs</h3>

  <label>Annual Parts</label>
  <input id="parts" type="number">

  <label>Cost per Part Low</label>
  <input id="cost_low" type="number">

  <label>Cost per Part High</label>
  <input id="cost_high" type="number">

  <label>Selling Price Low</label>
  <input id="price_low" type="number">

  <label>Selling Price High</label>
  <input id="price_high" type="number">

  <label>Scrap %</label>
  <input id="scrap" type="number">

  <label>Reduction %</label>
  <input id="reduction" type="number">

  <label>Variable Cost %</label>
  <input id="vc" type="number">
</div>

<div class="card">
  <h3>Summary</h3>
  <table>
    <tr>
      <th></th>
      <th>Low</th>
      <th>High</th>
    </tr>
    <tr>
      <td>Scrap</td>
      <td id="scrap_low">$0</td>
      <td id="scrap_high">$0</td>
    </tr>
    <tr>
      <td>Revenue</td>
      <td id="rev_low">$0</td>
      <td id="rev_high">$0</td>
    </tr>
    <tr>
      <td>Total</td>
      <td id="total_low">$0</td>
      <td id="total_high">$0</td>
    </tr>
  </table>
</div>

<div class="total" id="total_range">
$0 — $0
<br>
<span id="mid">$0</span>
</div>

</main>

<script>
function num(id){
  return parseFloat(document.getElementById(id).value) || 0;
}

function resolveRange(lowId, highId){
  let low = num(lowId);
  let high = num(highId);

  if(low===0 && high>0) low=high;
  if(high===0 && low>0) high=low;
  if(low>high){ let t=low; low=high; high=t;}

  return {low,high};
}

function fmt(x){
  return "$"+Math.round(x).toLocaleString();
}

function calc(){

  let parts = num("parts");
  let vc = num("vc")/100;

  let cost = resolveRange("cost_low","cost_high");
  let price = resolveRange("price_low","price_high");

  let recovered = parts * (num("scrap")/100) * (num("reduction")/100);

  let scrapLow = recovered * cost.low;
  let scrapHigh = recovered * cost.high;

  let revLow = recovered * price.low * (1-vc);
  let revHigh = recovered * price.high * (1-vc);

  let totalLow = scrapLow + revLow;
  let totalHigh = scrapHigh + revHigh;
  let mid = (totalLow+totalHigh)/2;

  document.getElementById("scrap_low").textContent = fmt(scrapLow);
  document.getElementById("scrap_high").textContent = fmt(scrapHigh);

  document.getElementById("rev_low").textContent = fmt(revLow);
  document.getElementById("rev_high").textContent = fmt(revHigh);

  document.getElementById("total_low").textContent = fmt(totalLow);
  document.getElementById("total_high").textContent = fmt(totalHigh);

  document.getElementById("total_range").innerHTML =
    fmt(totalLow) + " — " + fmt(totalHigh) +
    "<br><span style='font-size:16px'>Midpoint: " + fmt(mid) + "</span>";
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", calc);
});
</script>

</body>
</html>
