<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Control Correlation Tool — CTG</title>

<style>
:root{
  --blue:#003a70; --blue-dark:#002347; --teal:#00a7b5;
  --bg:#f4f6f9; --text:#1f2a3a;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

main{
  max-width:1400px;
  margin:24px auto;
  padding:20px;
}

/* KEEP CTG LOOK */
.card{
  background:#111;
  color:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.metric{
  display:inline-block;
  background:#1a1a1a;
  padding:12px;
  margin:5px;
  border-radius:8px;
  border:1px solid #00d4ff;
}

.metric.good{border-color:#00ff66}
.metric.warn{border-color:#fa0}
.metric.bad{border-color:#f55}

.insight-box{
  background:#0a1a1f;
  border:1px solid #00d4ff;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
td,th{
  padding:6px;
  border-bottom:1px solid #333;
}
.flagged{background:rgba(255,165,0,0.1)}
.flag-cell{color:#fa0;font-weight:700}

button{
  background:#00d4ff;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}
button:hover{background:#00b8d9}

input{padding:6px;margin:5px}
</style>
</head>

<body>

<!-- ✅ NAVBAR -->
<div id="navbar-container"></div>

<main>

<div class="card">
  <h2>Upload CSV</h2>
  <input type="file" id="fileInput">
  <br><br>
  <button onclick="processData()">Run Analysis</button>
</div>

<div id="results"></div>

</main>

<script src="navbar.js"></script>

<script>

/* ===============================
   DATA
================================= */
let data = [];

document.getElementById('fileInput').addEventListener('change', function(e){
  const reader = new FileReader();
  reader.onload = function(){
    const rows = reader.result.split("\n").map(r=>r.split(","));
    data = rows.slice(1).map(r=>({
      cup: parseFloat(r[0]),
      sensor: parseFloat(r[1])
    })).filter(r=>!isNaN(r.cup)&&!isNaN(r.sensor));

    alert("Loaded "+data.length+" rows");
  }
  reader.readAsText(e.target.files[0]);
});

/* ===============================
   STATS
================================= */
function mean(a){return a.reduce((s,v)=>s+v,0)/a.length}
function std(a){let m=mean(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1))}

function pearson(x,y){
  let mx=mean(x), my=mean(y);
  let num=0,dx=0,dy=0;
  for(let i=0;i<x.length;i++){
    num+=(x[i]-mx)*(y[i]-my);
    dx+=(x[i]-mx)**2;
    dy+=(y[i]-my)**2;
  }
  return num/Math.sqrt(dx*dy);
}

/* ===============================
   REGRESSION
================================= */
function linear(x,y){
  let mx=mean(x), my=mean(y);
  let num=0,den=0;

  for(let i=0;i<x.length;i++){
    num+=(x[i]-mx)*(y[i]-my);
    den+=(x[i]-mx)**2;
  }

  let m=num/den;
  let b=my-m*mx;

  let pred=x.map(v=>m*v+b);
  let res=y.map((v,i)=>v-pred[i]);

  let rmse=Math.sqrt(res.reduce((s,v)=>s+v*v,0)/y.length);
  let mae=mean(res.map(Math.abs));

  let r2=1-(res.reduce((s,v)=>s+v*v,0)/y.reduce((s,v)=>s+(v-my)**2,0));

  return {m,b,pred,res,rmse,mae,r2};
}

/* ===============================
   CAPABILITY
================================= */
function capability(values,lsl,usl){
  let mu=mean(values);
  let s=std(values);

  return {
    cp:(usl-lsl)/(6*s),
    cpk:Math.min((usl-mu)/(3*s),(mu-lsl)/(3*s))
  }
}

/* ===============================
   OUTLIERS
================================= */
function detect(model){
  let s=std(model.res);

  data.forEach((d,i)=>{
    d.pred=model.pred[i];
    d.res=model.res[i];
    d.flag = Math.abs(d.res/s)>3;
  });
}

/* ===============================
   MAIN
================================= */
function processData(){

  let x=data.map(d=>d.cup);
  let y=data.map(d=>d.sensor);

  let model=linear(x,y);
  detect(model);

  let cap=capability(x,25,45); // you can hook to UI later

  render(model,cap);
}

/* ===============================
   RENDER
================================= */
function render(model,cap){

  let anomalies=data.filter(d=>d.flag).length;

  document.getElementById('results').innerHTML = `
  <div class="card">

  <div class="insight-box">
  <b>Executive Summary</b><br>
  R²: ${model.r2.toFixed(3)}<br>
  RMSE: ${model.rmse.toFixed(2)}<br>
  MAE: ${model.mae.toFixed(2)}<br>
  Anomalies: ${anomalies}
  </div>

  <div class="metric">R²<br>${model.r2.toFixed(3)}</div>
  <div class="metric">RMSE<br>${model.rmse.toFixed(2)}</div>
  <div class="metric">Cpk<br>${cap.cpk.toFixed(2)}</div>

  <hr>

  <h3>Predict</h3>
  Cup: <input id="cupInput">
  <button onclick="predict()">Predict Sensor</button>
  <div id="pred"></div>

  <hr>

  <h3>Data</h3>
  <table>
  <tr><th>Cup</th><th>Sensor</th><th>Pred</th><th>Residual</th><th>Flag</th></tr>

  ${data.map(d=>`
  <tr class="${d.flag?'flagged':''}">
    <td>${d.cup}</td>
    <td>${d.sensor}</td>
    <td>${d.pred.toFixed(2)}</td>
    <td>${d.res.toFixed(2)}</td>
    <td class="flag-cell">${d.flag?'⚠':''}</td>
  </tr>
  `).join("")}

  </table>

  </div>
  `;
}

/* ===============================
   PREDICT
================================= */
function predict(){
  let v=parseFloat(document.getElementById("cupInput").value);
  let x=data.map(d=>d.cup);
  let y=data.map(d=>d.sensor);
  let m=linear(x,y);

  let pred=m.m*v+m.b;

  document.getElementById("pred").innerHTML =
    "Predicted Sensor: "+pred.toFixed(2);
}

</script>

</body>
</html>
