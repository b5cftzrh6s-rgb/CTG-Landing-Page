<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Control Correlation Tool — CTG Tools</title>

<!-- ✅ FIXED SCRIPT LOADING -->
https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6f9}

.navbar{background:#002347;color:#fff;padding:15px 20px;display:flex;justify-content:space-between}
.navbar a{color:#fff;text-decoration:none;margin:0 10px}
.navbar a.active{background:#00a7b5;padding:6px 10px;border-radius:4px}

header{background:#003a70;color:#fff;padding:25px}

main{max-width:1200px;margin:20px auto;padding:20px}

.card{background:#111;color:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
input,select{width:100%;padding:8px;margin-top:6px;background:#1a1a1a;color:#fff;border:1px solid #333}

.status{margin-top:10px}
</style>
</head>

<body>

<nav class="navbar">
  <div>CTG | Colloidal Technologies Group</div>
  <div>
    <a href="index.html">Home</a>
    <a href="shell-control-correlation.html" class="active">Correlation</a>
    <a href="shell-control-value-calculator.html">Value</a>
    <a href="slurry-calculator.html">Slurry</a>
    <a href="tank-rpm-calculator.html">RPM</a>
  </div>
</nav>

<header>
  <h1>Shell Control Correlation Tool</h1>
</header>

<main>

<div class="card">
  <h3>Upload CSV</h3>
  <input type="file" id="fileInput">
  <div id="status" class="status"></div>
</div>

<div class="card" id="controls" style="display:none">
  <h3>Column Mapping</h3>
  <label>Date</label><select id="dateCol"></select>
  <label>Cup Seconds</label><select id="manualCol"></select>
  <label>Sensor cP</label><select id="sensorCol"></select>
</div>

</main>

<script>

let rawRows = [];
let headers = [];

// ✅ FILE UPLOAD FIXED
document.getElementById("fileInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const status = document.getElementById("status");

  if(typeof Papa === "undefined"){
    status.innerHTML = "❌ PapaParse failed to load";
    return;
  }

  status.innerHTML = "Reading file...";

  Papa.parse(file, {
    complete: function(result){

      try{

        const data = result.data;
        if(!data.length) throw "Empty file";

        // ✅ SIMPLE HEADER DETECTION (robust)
        headers = data[0];
        rawRows = data.slice(1);

        // ✅ Populate dropdowns
        ["dateCol","manualCol","sensorCol"].forEach(id=>{
          const sel = document.getElementById(id);
          sel.innerHTML = "";
          headers.forEach((h,i)=>{
            sel.add(new Option(h,i));
          });
        });

        document.getElementById("controls").style.display = "block";

        status.innerHTML = "✅ Loaded " + rawRows.length + " rows";

      }catch(err){
        status.innerHTML = "❌ Error: " + err;
        console.error(err);
      }

    }
  });

});

</script>

</body>
</html>
