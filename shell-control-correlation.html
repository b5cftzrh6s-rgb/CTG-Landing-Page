<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Control Correlation Tool — Advanced Analytics</title>

<style>
/* KEEP YOUR EXISTING STYLES — ADD BELOW */

.metric.good{border-color:#00ff66}
.metric.warn{border-color:#fa0}
.metric.bad{border-color:#f55}
.metric-value.good{color:#00ff66}
.metric-value.warn{color:#fa0}
.metric-value.bad{color:#f55}

.insight-box{
  background:#0a1a1f;
  border:1px solid #00d4ff;
  padding:12px;
  border-radius:8px;
  margin:10px 0;
}

.flagged{background:rgba(255,165,0,0.1)}
.flag-cell{color:#fa0;font-weight:700}

.chart-container{
  height:300px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1 style="text-align:center">Shell Control Correlation — Advanced Engine</h1>

<div style="padding:20px">

<input type="file" id="fileInput"><br><br>
<button onclick="processData()">Run Analysis</button>

<hr>

<div id="results"></div>

</div>

<script>

/* ===============================
   BASIC PARSE + DATA
================================= */

var data = [];

document.getElementById('fileInput').addEventListener('change', function(e){
  const reader = new FileReader();
  reader.onload = function(){
    const rows = reader.result.split("\n").map(r=>r.split(","));
    data = rows.slice(1).map(r=>({
      cup: parseFloat(r[0]),
      sensor: parseFloat(r[1])
    })).filter(r=>!isNaN(r.cup)&&!isNaN(r.sensor));
    alert("Loaded "+data.length+" rows");
  }
  reader.readAsText(e.target.files[0]);
});

/* ===============================
   STATS
================================= */

function mean(a){return a.reduce((s,v)=>s+v,0)/a.length}
function std(a){let m=mean(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1))}
function pearson(x,y){
  let mx=mean(x), my=mean(y);
  let num=0,dx=0,dy=0;
  for(let i=0;i<x.length;i++){
    num+=(x[i]-mx)*(y[i]-my);
    dx+=(x[i]-mx)**2;
    dy+=(y[i]-my)**2;
  }
  return num/Math.sqrt(dx*dy);
}

/* ===============================
   REGRESSION
================================= */

function linear(x,y){
  let mx=mean(x), my=mean(y);
  let num=0,den=0;
  for(let i=0;i<x.length;i++){
    num+=(x[i]-mx)*(y[i]-my);
    den+=(x[i]-mx)**2;
  }
  let m=num/den;
  let b=my-m*mx;

  let preds=x.map(v=>m*v+b);
  let res=y.map((v,i)=>v-preds[i]);

  return {
    m,b,
    pred:preds,
    res,
    r2:1-(res.reduce((s,v)=>s+v*v,0)/y.reduce((s,v)=>s+(v-my)**2,0)),
    rmse:Math.sqrt(res.reduce((s,v)=>s+v*v,0)/y.length),
    mae:mean(res.map(Math.abs))
  }
}

/* ===============================
   CAPABILITY
================================= */

function capability(values,lsl,usl){
  let mu=mean(values);
  let s=std(values);

  return {
    cp:(usl-lsl)/(6*s),
    cpk:Math.min((usl-mu)/(3*s),(mu-lsl)/(3*s))
  }
}

/* ===============================
   OUTLIERS
================================= */

function detect(data,model){
  let s=std(model.res);

  data.forEach((d,i)=>{
    d.pred=model.pred[i];
    d.res=model.res[i];
    d.flag = Math.abs(d.res/s)>3;
  });
}

/* ===============================
   MAIN
================================= */

function processData(){

  let x=data.map(d=>d.cup);
  let y=data.map(d=>d.sensor);

  let model=linear(x,y);
  detect(data,model);

  let cap=capability(x,25,45); // example limits

  render(model,cap);
}

/* ===============================
   RENDER
================================= */

function render(model,cap){

  let anomalies = data.filter(d=>d.flag).length;

  document.getElementById('results').innerHTML = `

  <div class="insight-box">
  <b>Executive Summary</b><br>
  Correlation (r²): ${model.r2.toFixed(3)}<br>
  RMSE: ${model.rmse.toFixed(2)}<br>
  MAE: ${model.mae.toFixed(2)}<br>
  Anomalies: ${anomalies}
  </div>

  <div class="metric">
    <div>R²</div>
    <div>${model.r2.toFixed(3)}</div>
  </div>

  <div class="metric">
    <div>RMSE</div>
    <div>${model.rmse.toFixed(2)}</div>
  </div>

  <div class="metric">
    <div>Cpk</div>
    <div>${cap.cpk.toFixed(2)}</div>
  </div>

  <hr>

  <h3>What-if Predictor</h3>

  Cup: <input id="cupInput">
  <button onclick="predict()">Predict Sensor</button>

  <div id="pred"></div>

  <hr>

  <h3>Data Table</h3>

  <table border="1" cellpadding="5">
  <tr>
    <th>Cup</th>
    <th>Sensor</th>
    <th>Pred</th>
    <th>Residual</th>
    <th>Flag</th>
  </tr>

  ${data.map(d=>`
    <tr class="${d.flag?'flagged':''}">
      <td>${d.cup}</td>
      <td>${d.sensor}</td>
      <td>${d.pred.toFixed(2)}</td>
      <td>${d.res.toFixed(2)}</td>
      <td class="flag-cell">${d.flag?'⚠':''}</td>
    </tr>
  `).join("")}

  </table>
  `;
}

/* ===============================
   PREDICTOR
================================= */

function predict(){
  let v=parseFloat(document.getElementById("cupInput").value);
  let x=data.map(d=>d.cup);
  let y=data.map(d=>d.sensor);
  let m=linear(x,y);

  let pred=m.m*v+m.b;

  document.getElementById("pred").innerHTML =
    "Predicted Sensor: "+pred.toFixed(2);
}

</script>

</body>
</html>
